<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virgin v1</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #111;
      border-bottom: 2px solid #3a0000;
      padding: 15px 30px;
      display: flex;
      align-items: center;
    }

    .logo {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #ff1a1a, #c8102e, #ff4d4d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .search-header {
      flex: 1;
      max-width: 720px;
      margin: 0 30px;
      position: relative;
    }

    .search-header input {
      width: 100%;
      padding: 14px 20px;
      padding-right: 130px;
      font-size: 1.15rem;
      background: #1a1a1a;
      border: 2px solid #3a0000;
      border-radius: 50px;
      color: white;
      outline: none;
    }

    .search-header input:focus {
      border-color: #ff1a1a;
      box-shadow: 0 0 0 3px rgba(255, 26, 26, 0.25);
    }

    .search-btn {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      background: linear-gradient(90deg, #c8102e, #ff1a1a);
      color: white;
      border: none;
      padding: 11px 26px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
    }

    .iframe-container {
      flex: 1;
      background: #000;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(10, 10, 10, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 20;
    }

    .overlay.hidden { display: none; }

    .welcome {
      font-size: 2.8rem;
      color: #ff4d4d;
      margin-bottom: 12px;
    }

    .new-search-btn {
      position: absolute;
      top: 18px;
      right: 30px;
      background: #3a0000;
      color: #ff9999;
      border: 1px solid #660000;
      padding: 9px 18px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.95rem;
      z-index: 30;
    }

    footer {
      background: #111;
      padding: 12px;
      text-align: center;
      color: #660000;
      font-size: 0.9rem;
      border-top: 1px solid #3a0000;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">VIRGIN v1</div>
    
    <div class="search-header">
      <input type="text" id="searchInput" placeholder="Paste link (e.g. 99.ip.nowgg.fun/...) or search Bing" autocomplete="off">
      <button class="search-btn" onclick="performSearch()">GO</button>
    </div>
  </header>

  <div class="iframe-container">
    <button class="new-search-btn" onclick="newSearch()">NEW SEARCH</button>

    <div class="overlay" id="overlay">
      <div class="welcome">Virgin v1</div>
      <p style="color:#ff9999; font-size:1.1rem;">Type a link or search term above</p>
    </div>

    <iframe id="resultFrame" src="about:blank"></iframe>
  </div>

  <footer>
    Virgin v1 • Black &amp; Blood Red • Bing + Direct Links + Proxy Fallback
  </footer>

  <script>
    const CORS_PROXY = "https://corsproxy.io/?";

    function isUrlLike(str) {
      str = str.trim();
      if (!str) return false;
      // Looks like a URL (domain + optional path)
      return /^(https?:\/\/)?([a-z0-9-]+\.)+[a-z0-9]+(\/.*)?$/i.test(str) ||
             (str.includes('.') && !str.includes(' ') && str.length > 8);
    }

    function performSearch() {
      let input = document.getElementById('searchInput').value.trim();
      if (!input) return;

      let target = "";

      if (isUrlLike(input)) {
        // Add https:// if missing
        if (!input.startsWith('http')) {
          target = 'https://' + input;
        } else {
          target = input;
        }
      } else {
        // Bing search
        target = `https://www.bing.com/search?q=${encodeURIComponent(input)}`;
      }

      // Hide overlay
      document.getElementById('overlay').classList.add('hidden');

      const iframe = document.getElementById('resultFrame');

      // First try direct load
      iframe.src = target;

      // If it fails (now.gg often refuses), fallback to proxy after a short delay
      setTimeout(() => {
        // Simple check - if iframe is still showing error, try proxy
        // Note: We can't perfectly detect iframe content error from parent, but we give it a chance
        if (iframe.src === target) {
          console.log("Trying proxy fallback for:", target);
          iframe.src = CORS_PROXY + encodeURIComponent(target);
        }
      }, 1800); // 1.8 seconds delay to let direct attempt fail visibly
    }

    function newSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('overlay').classList.remove('hidden');
      document.getElementById('resultFrame').src = 'about:blank';
      document.getElementById('searchInput').focus();
    }

    // Enter key
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') performSearch();
    });

    window.onload = () => {
      document.getElementById('searchInput').focus();
    };
  </script>
</body>
</html>
