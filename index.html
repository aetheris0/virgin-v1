<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virgin v1</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #111;
      border-bottom: 2px solid #3a0000;
      padding: 15px 30px;
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 100;
    }

    .logo {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #ff1a1a, #c8102e, #ff4d4d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(255, 26, 26, 0.5);
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
    }

    .nav-btn {
      background: #1f1f1f;
      border: 1px solid #3a0000;
      color: #ff9999;
      padding: 10px 20px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .nav-btn:hover, .nav-btn.active {
      background: linear-gradient(90deg, #c8102e, #ff1a1a);
      color: white;
      border-color: #ff4d4d;
      box-shadow: 0 0 15px rgba(255, 26, 26, 0.4);
    }

    .search-header {
      flex: 1;
      max-width: 720px;
      position: relative;
    }

    .search-header input {
      width: 100%;
      padding: 14px 20px;
      padding-right: 140px;
      font-size: 1.15rem;
      background: #1a1a1a;
      border: 2px solid #3a0000;
      border-radius: 50px;
      color: white;
      outline: none;
    }

    .search-header input:focus {
      border-color: #ff1a1a;
      box-shadow: 0 0 0 3px rgba(255, 26, 26, 0.25);
    }

    .search-btn {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      background: linear-gradient(90deg, #c8102e, #ff1a1a);
      color: white;
      border: none;
      padding: 11px 26px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
    }

    .proxy-selector {
      background: #1f1f1f;
      border: 2px solid #3a0000;
      color: #ff9999;
      padding: 8px 14px;
      border-radius: 30px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .main-content {
      flex: 1;
      overflow: auto;
      padding: 40px 30px;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 28px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .game-card {
      background: #111;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #3a0000;
      transition: all 0.4s ease;
      cursor: pointer;
    }

    .game-card:hover {
      transform: translateY(-12px) scale(1.03);
      border-color: #ff1a1a;
      box-shadow: 0 20px 40px rgba(255, 26, 26, 0.25);
    }

    .game-card img {
      width: 100%;
      height: 190px;
      object-fit: cover;
    }

    .game-info {
      padding: 16px;
      text-align: center;
    }

    .game-info h3 {
      color: #ff9999;
      font-size: 1.15rem;
    }

    .iframe-container {
      flex: 1;
      background: #000;
      position: relative;
      display: none;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .force-proxy-btn {
      position: absolute;
      top: 25px;
      right: 180px;
      background: #660000;
      color: #ffcccc;
      border: none;
      padding: 10px 20px;
      border-radius: 30px;
      cursor: pointer;
      z-index: 200;
      display: none;
    }

    footer {
      background: #111;
      padding: 12px;
      text-align: center;
      color: #660000;
      font-size: 0.9rem;
      border-top: 1px solid #3a0000;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">VIRGIN v1</div>
    
    <div class="nav-buttons">
      <button class="nav-btn active" onclick="showSearch()">🔍 Search</button>
      <button class="nav-btn" onclick="showGames()">🖳 Games</button>
    </div>

    <div class="search-header">
      <input type="text" id="searchInput" placeholder="Paste any link here..." autocomplete="off">
      <button class="search-btn" onclick="performSearch()">GO</button>
    </div>

    <select id="proxySelect" class="proxy-selector" onchange="changeProxy()">
      <option value="direct">Direct (no proxy)</option>
      <option value="corsproxy" selected>corsproxy.io (fast)</option>
      <option value="codetabs">codetabs.com</option>
      <option value="thingproxy">ThingProxy</option>
    </select>
  </header>

  <!-- Search / Main Area -->
  <div class="main-content" id="mainContent">
    <!-- Games or search content will go here via JS -->
  </div>

  <!-- Game / Link Viewer -->
  <div class="iframe-container" id="iframeContainer">
    <button onclick="closeIframe()" style="position:absolute;top:25px;right:30px;z-index:300;padding:12px 24px;background:#3a0000;color:#ff9999;border:none;border-radius:50px;cursor:pointer;">← Back</button>
    <button class="force-proxy-btn" id="forceProxyBtn" onclick="forceReloadWithProxy()">🔄 Force Proxy</button>
    <iframe id="mainFrame" src="about:blank"></iframe>
  </div>

  <footer>
    Virgin v1 • Black &amp; Blood Red • Updated Proxies 2026
  </footer>

  <script>
    const PROXIES = {
      direct: "",
      corsproxy: "https://corsproxy.io/?",
      codetabs: "https://api.codetabs.com/v1/proxy?quest=",
      thingproxy: "https://thingproxy.freeboard.io/fetch/"
    };

    let currentProxy = "corsproxy";

    function changeProxy() {
      currentProxy = document.getElementById('proxySelect').value;
    }

    function getProxiedUrl(url) {
      if (currentProxy === "direct") return url;
      return PROXIES[currentProxy] + encodeURIComponent(url);
    }

    function performSearch() {
      let input = document.getElementById('searchInput').value.trim();
      if (!input) return;

      let target = input.startsWith('http') ? input : 'https://' + input;

      document.getElementById('mainContent').style.display = 'none';
      document.getElementById('iframeContainer').style.display = 'flex';
      document.getElementById('forceProxyBtn').style.display = 'none';

      document.getElementById('mainFrame').src = getProxiedUrl(target);
    }

    function forceReloadWithProxy() {
      const iframe = document.getElementById('mainFrame');
      let currentSrc = iframe.src;

      // Cycle proxy
      const keys = Object.keys(PROXIES);
      let idx = keys.indexOf(currentProxy);
      currentProxy = keys[(idx + 1) % keys.length];
      document.getElementById('proxySelect').value = currentProxy;

      // Reload with new proxy
      let originalUrl = currentSrc;
      if (currentSrc.includes('?')) {
        originalUrl = decodeURIComponent(currentSrc.split('=')[1] || currentSrc);
      }
      iframe.src = getProxiedUrl(originalUrl);
    }

    function closeIframe() {
      document.getElementById('mainFrame').src = 'about:blank';
      document.getElementById('iframeContainer').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      document.getElementById('forceProxyBtn').style.display = 'none';
    }

    // Games Section (placeholder - add your game cards here later)
    function showGames() {
      document.getElementById('mainContent').innerHTML = `
        <div style="text-align:center; color:#ff4d4d; font-size:2.5rem; margin-top:100px;">
          🖳 Games Page<br><br>
          <span style="font-size:1.4rem; color:#ff9999;">Coming Soon - Add your game cards here</span>
        </div>`;
      document.getElementById('mainContent').style.display = 'block';
      document.getElementById('iframeContainer').style.display = 'none';
    }

    function showSearch() {
      document.getElementById('mainContent').innerHTML = `
        <div style="text-align:center; margin-top:120px; color:#ff9999;">
          <h2 style="font-size:2.5rem;">Virgin v1</h2>
          <p style="font-size:1.4rem;">Paste any link above</p>
        </div>`;
      document.getElementById('mainContent').style.display = 'block';
      document.getElementById('iframeContainer').style.display = 'none';
    }

    // Enter key support
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') performSearch();
    });

    window.onload = () => {
      showSearch();
      document.getElementById('searchInput').focus();
    };
  </script>
</body>
</html>
