<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virgin v1</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #111;
      border-bottom: 2px solid #3a0000;
      padding: 15px 30px;
      display: flex;
      align-items: center;
    }

    .logo {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #ff1a1a, #c8102e, #ff4d4d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .search-header {
      flex: 1;
      max-width: 720px;
      margin: 0 30px;
      position: relative;
    }

    .search-header input {
      width: 100%;
      padding: 14px 20px;
      padding-right: 120px;
      font-size: 1.15rem;
      background: #1a1a1a;
      border: 2px solid #3a0000;
      border-radius: 50px;
      color: white;
      outline: none;
    }

    .search-header input:focus {
      border-color: #ff1a1a;
      box-shadow: 0 0 0 3px rgba(255, 26, 26, 0.25);
    }

    .search-btn {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      background: linear-gradient(90deg, #c8102e, #ff1a1a);
      color: white;
      border: none;
      padding: 11px 26px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
    }

    .iframe-container {
      flex: 1;
      background: #000;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(10, 10, 10, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 10;
    }

    .overlay.hidden { opacity: 0; pointer-events: none; }

    .welcome {
      font-size: 2.8rem;
      color: #ff4d4d;
      margin-bottom: 10px;
    }

    footer {
      background: #111;
      padding: 12px;
      text-align: center;
      color: #660000;
      font-size: 0.9rem;
      border-top: 1px solid #3a0000;
    }

    .new-search {
      position: absolute;
      top: 15px;
      right: 30px;
      background: #3a0000;
      color: #ff9999;
      border: none;
      padding: 8px 16px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">VIRGIN v1</div>
    
    <div class="search-header">
      <input type="text" id="searchInput" placeholder="Paste link or search with Bing..." autocomplete="off">
      <button class="search-btn" onclick="performSearch()">GO</button>
    </div>
  </header>

  <div class="iframe-container">
    <button class="new-search" onclick="newSearch()">NEW SEARCH</button>

    <div class="overlay" id="overlay">
      <div class="welcome">Virgin v1</div>
      <p style="color:#ff9999; font-size:1.1rem;">Type a link or search term</p>
    </div>

    <iframe id="resultFrame" src="about:blank" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
  </div>

  <footer>
    Virgin v1 • Black &amp; Blood Red • Bing Search + Direct Links
  </footer>

  <script>
    function isUrlLike(str) {
      str = str.trim();
      // Check if it looks like a domain or link (with or without https)
      return /^(https?:\/\/)?([\w\-]+\.)+[\w\-]+(\/.*)?$/i.test(str) || 
             str.includes('.') && !str.includes(' ');
    }

    function performSearch() {
      let input = document.getElementById('searchInput').value.trim();
      if (!input) return;

      let target = "";

      if (isUrlLike(input)) {
        // Add https:// if missing
        if (!input.startsWith('http://') && !input.startsWith('https://')) {
          target = 'https://' + input;
        } else {
          target = input;
        }
      } else {
        // Normal search on Bing only
        target = `https://www.bing.com/search?q=${encodeURIComponent(input)}`;
      }

      document.getElementById('overlay').classList.add('hidden');
      document.getElementById('resultFrame').src = target;
    }

    function newSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('overlay').classList.remove('hidden');
      document.getElementById('resultFrame').src = 'about:blank';
      document.getElementById('searchInput').focus();
    }

    // Enter key support
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') performSearch();
    });

    window.onload = () => {
      document.getElementById('searchInput').focus();
    };
  </script>
</body>
</html>
