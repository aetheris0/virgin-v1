<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virgin v1</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #111;
      border-bottom: 2px solid #3a0000;
      padding: 15px 30px;
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 100;
    }

    .logo {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #ff1a1a, #c8102e, #ff4d4d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(255, 26, 26, 0.5);
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
    }

    .nav-btn {
      background: #1f1f1f;
      border: 1px solid #3a0000;
      color: #ff9999;
      padding: 10px 20px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .nav-btn:hover, .nav-btn.active {
      background: linear-gradient(90deg, #c8102e, #ff1a1a);
      color: white;
      border-color: #ff4d4d;
      box-shadow: 0 0 15px rgba(255, 26, 26, 0.4);
    }

    .search-header {
      flex: 1;
      max-width: 720px;
      position: relative;
    }

    .search-header input {
      width: 100%;
      padding: 14px 20px;
      padding-right: 130px;
      font-size: 1.15rem;
      background: #1a1a1a;
      border: 2px solid #3a0000;
      border-radius: 50px;
      color: white;
      outline: none;
      transition: all 0.3s;
    }

    .search-header input:focus {
      border-color: #ff1a1a;
      box-shadow: 0 0 0 3px rgba(255, 26, 26, 0.25);
    }

    .search-btn {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      background: linear-gradient(90deg, #c8102e, #ff1a1a);
      color: white;
      border: none;
      padding: 11px 26px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(200, 16, 46, 0.4);
    }

    .proxy-selector {
      background: #1f1f1f;
      border: 2px solid #3a0000;
      color: #ff9999;
      padding: 8px 14px;
      border-radius: 30px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .main-content {
      flex: 1;
      overflow: auto;
      padding: 40px 30px;
      background: #0a0a0a;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 28px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .game-card {
      background: #111;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #3a0000;
      transition: all 0.4s ease;
      cursor: pointer;
    }

    .game-card:hover {
      transform: translateY(-12px) scale(1.03);
      border-color: #ff1a1a;
      box-shadow: 0 20px 40px rgba(255, 26, 26, 0.25);
    }

    .game-card img {
      width: 100%;
      height: 190px;
      object-fit: cover;
    }

    .game-info {
      padding: 16px;
      text-align: center;
    }

    .game-info h3 {
      color: #ff9999;
      font-size: 1.15rem;
    }

    .iframe-container {
      flex: 1;
      background: #000;
      position: relative;
      display: none;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(10, 10, 10, 0.95);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 50;
    }

    .welcome {
      font-size: 2.8rem;
      color: #ff4d4d;
      margin-bottom: 12px;
    }

    footer {
      background: #111;
      padding: 12px;
      text-align: center;
      color: #660000;
      font-size: 0.9rem;
      border-top: 1px solid #3a0000;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">VIRGIN v1</div>
    
    <div class="nav-buttons">
      <button class="nav-btn active" onclick="showSearch()">🔍 Search</button>
      <button class="nav-btn" onclick="showGames()">🖳 Games</button>
    </div>

    <div class="search-header" id="searchBar">
      <input type="text" id="searchInput" placeholder="Paste link or search with Bing..." autocomplete="off">
      <button class="search-btn" onclick="performSearch()">GO</button>
    </div>

    <select id="proxySelect" class="proxy-selector">
      <option value="direct">Direct</option>
      <option value="corsproxy">corsproxy.io</option>
      <option value="allorigins" selected>AllOrigins</option>
      <option value="thingproxy">ThingProxy</option>
    </select>
  </header>

  <!-- Search Page -->
  <div class="main-content" id="searchPage">
    <div style="text-align:center; margin-top:100px; color:#ff9999;">
      <h2 style="font-size:2.2rem; margin-bottom:20px;">Welcome to Virgin v1</h2>
      <p style="font-size:1.3rem;">Search or paste any link below</p>
    </div>
  </div>

  <!-- Games Page -->
  <div class="main-content" id="gamesPage" style="display:none;">
    <div class="games-grid">
      <div class="game-card" onclick="loadGame('cl1.html')">
        <img src="https://cdn.comic.studio/images/32361/characters/2ea59e1fc49d9d41026fd937dcf3e579.png?filename=tile_0_1.png" alt="1">
        <div class="game-info"><h3>1</h3></div>
      </div>

      <div class="game-card" onclick="loadGame('cl10minutestildawn.html')">
        <img src="https://imgs.crazygames.com/auto-covers/10-minutes-till-dawn_1x1.png?format=auto&quality=70&metadata=none" alt="10 Minutes Till Dawn">
        <div class="game-info"><h3>10 Minutes Till Dawn</h3></div>
      </div>

      <div class="game-card" onclick="loadGame('clnullkevin.html')">
        <img src="https://www.freegameplanet.com/wp-content/uploads/2021/06/10-103-Null-Kelvin-game-download.jpg" alt="10-103 Null Kevin">
        <div class="game-info"><h3>10-103 Null Kevin</h3></div>
      </div>

      <div class="game-card" onclick="loadGame('cl12minibattles.html')">
        <img src="https://gamebubu.com/uploads/allimg/210519/1-2105191636010-L.jpg" alt="12 Mini Battles">
        <div class="game-info"><h3>12 Mini Battles</h3></div>
      </div>

      <div class="game-card" onclick="loadGame('cl1v1maybeidk.html')">
        <img src="https://cdn.now.gg/apps-content/com.nowgg.h5.pub501.app51614/game-tiles/1v1-lol.jpg" alt="1v1.lol">
        <div class="game-info"><h3>1v1.lol</h3></div>
      </div>

      <div class="game-card" onclick="loadGame('cl2048.html')">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR9M4Teb3aBhTsijACY6naZwakN-Jvo6HN8QQ&s" alt="2048">
        <div class="game-info"><h3>2048</h3></div>
      </div>

      <div class="game-card" onclick="loadGame('cl2048cupcakes.html')">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSBBDwj2yNBU0bH2ZEKv9oeG018DvzmKuz9TQ&s" alt="2048 Cupcakes">
        <div class="game-info"><h3>2048 Cupcakes</h3></div>
      </div>

      <div class="game-card" onclick="loadGame('cl234playergame.html')">
        <img src="https://img.utdstc.com/icon/947/543/9475439c9b6732567cc92fe3b2aeff40094ea2bbf5beb6425551b6120b0c254b:200" alt="2-3-4 Player Games">
        <div class="game-info"><h3>2-3-4 Player Games</h3></div>
      </div>
    </div>
  </div>

  <!-- Game Loading Container -->
  <div class="iframe-container" id="gameFrameContainer">
    <button onclick="closeGame()" 
            style="position:absolute; top:25px; right:30px; z-index:200; padding:12px 24px; background:#3a0000; color:#ff9999; border:none; border-radius:50px; cursor:pointer; font-weight:600;">
      ← Back to Games
    </button>
    <iframe id="gameFrame" src="about:blank"></iframe>
  </div>

  <footer>
    Virgin v1 • Black &amp; Blood Red Edition
  </footer>

  <script>
    let currentProxy = "allorigins";

    const PROXIES = {
      direct: "",
      corsproxy: "https://corsproxy.io/?",
      allorigins: "https://api.allorigins.win/raw?url=",
      thingproxy: "https://thingproxy.freeboard.io/fetch/"
    };

    function showSearch() {
      document.getElementById('searchPage').style.display = 'block';
      document.getElementById('gamesPage').style.display = 'none';
      document.getElementById('gameFrameContainer').style.display = 'none';
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.nav-btn')[0].classList.add('active');
    }

    function showGames() {
      document.getElementById('searchPage').style.display = 'none';
      document.getElementById('gamesPage').style.display = 'block';
      document.getElementById('gameFrameContainer').style.display = 'none';
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.nav-btn')[1].classList.add('active');
    }

    function loadGame(filename) {
      document.getElementById('gamesPage').style.display = 'none';
      document.getElementById('gameFrameContainer').style.display = 'flex';
      document.getElementById('gameFrame').src = filename;
    }

    function closeGame() {
      document.getElementById('gameFrame').src = 'about:blank';
      document.getElementById('gameFrameContainer').style.display = 'none';
      document.getElementById('gamesPage').style.display = 'block';
    }

    function performSearch() {
      const input = document.getElementById('searchInput').value.trim();
      if (!input) return;

      let url = /^(https?:\/\/)?([a-z0-9-]+\.)+[a-z0-9]+/i.test(input) 
        ? (input.startsWith('http') ? input : 'https://' + input)
        : `https://www.bing.com/search?q=${encodeURIComponent(input)}`;

      if (currentProxy !== "direct") {
        url = PROXIES[currentProxy] + encodeURIComponent(url);
      }

      window.open(url, '_blank');
    }

    // Enter key
    document.getElementById('searchInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') performSearch();
    });

    window.onload = () => {
      showSearch();
      document.getElementById('searchInput').focus();
    };
  </script>
</body>
</html>
