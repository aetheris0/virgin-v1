<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virgin v1</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #111;
      border-bottom: 2px solid #3a0000;
      padding: 15px 30px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #ff1a1a, #c8102e, #ff4d4d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
    }

    .nav-btn {
      background: #1f1f1f;
      border: 1px solid #3a0000;
      color: #ff9999;
      padding: 10px 18px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .nav-btn:hover {
      background: #2a0000;
      border-color: #ff1a1a;
      color: white;
    }

    .search-header {
      flex: 1;
      max-width: 720px;
      position: relative;
    }

    .search-header input {
      width: 100%;
      padding: 14px 20px;
      padding-right: 130px;
      font-size: 1.15rem;
      background: #1a1a1a;
      border: 2px solid #3a0000;
      border-radius: 50px;
      color: white;
      outline: none;
    }

    .search-header input:focus {
      border-color: #ff1a1a;
      box-shadow: 0 0 0 3px rgba(255, 26, 26, 0.25);
    }

    .search-btn {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      background: linear-gradient(90deg, #c8102e, #ff1a1a);
      color: white;
      border: none;
      padding: 11px 26px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
    }

    .proxy-selector {
      background: #1f1f1f;
      border: 2px solid #3a0000;
      color: #ff9999;
      padding: 8px 14px;
      border-radius: 30px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .iframe-container {
      flex: 1;
      background: #000;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(10, 10, 10, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 30;
    }

    .overlay.hidden { display: none; }

    .welcome, .coming-soon {
      font-size: 2.8rem;
      color: #ff4d4d;
      margin-bottom: 12px;
    }

    .new-search-btn, .reload-proxy-btn {
      position: absolute;
      top: 18px;
      right: 30px;
      background: #3a0000;
      color: #ff9999;
      border: 1px solid #660000;
      padding: 9px 18px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.95rem;
      z-index: 40;
    }

    .reload-proxy-btn {
      right: 180px;
      background: #660000;
    }

    footer {
      background: #111;
      padding: 12px;
      text-align: center;
      color: #660000;
      font-size: 0.9rem;
      border-top: 1px solid #3a0000;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">VIRGIN v1</div>
    
    <div class="nav-buttons">
      <button class="nav-btn" onclick="showGames()">🖳 Games</button>
    </div>

    <div class="search-header">
      <input type="text" id="searchInput" placeholder="Paste link (now.gg works better now) or search Bing..." autocomplete="off">
      <button class="search-btn" onclick="performSearch()">GO</button>
    </div>

    <select id="proxySelect" class="proxy-selector" onchange="saveProxyChoice()">
      <option value="direct">Direct</option>
      <option value="corsproxy">corsproxy.io</option>
      <option value="allorigins" selected>AllOrigins (best for now.gg)</option>
      <option value="thingproxy">ThingProxy</option>
    </select>
  </header>

  <div class="iframe-container">
    <button class="new-search-btn" onclick="newSearch()">NEW SEARCH</button>
    <button class="reload-proxy-btn" onclick="reloadWithProxy()" id="reloadBtn" style="display:none;">🔄 RELOAD WITH PROXY</button>

    <div class="overlay" id="overlay">
      <div class="welcome">Virgin v1</div>
      <p style="color:#ff9999; font-size:1.1rem;">Type a link or search term</p>
    </div>

    <!-- Games Coming Soon Overlay -->
    <div class="overlay" id="gamesOverlay" style="display:none; background: rgba(10,10,10,0.98);">
      <div class="coming-soon">🖳 Games Page</div>
      <p style="color:#ff9999; font-size:1.2rem; text-align:center; max-width:400px;">
        Coming Soon...<br><br>
        Full games section with now.gg & more unblocked games will be here.
      </p>
      <button onclick="hideGames()" style="margin-top:30px; padding:12px 30px; background:#c8102e; border:none; border-radius:30px; color:white; font-size:1.1rem; cursor:pointer;">
        Back to Search
      </button>
    </div>

    <iframe id="resultFrame" src="about:blank"></iframe>
  </div>

  <footer>
    Virgin v1 • Black &amp; Blood Red • Improved now.gg stability + Games Coming Soon
  </footer>

  <script>
    const PROXIES = {
      direct: "",
      corsproxy: "https://corsproxy.io/?",
      allorigins: "https://api.allorigins.win/raw?url=",
      thingproxy: "https://thingproxy.freeboard.io/fetch/"
    };

    let currentProxy = "allorigins";

    function saveProxyChoice() {
      currentProxy = document.getElementById('proxySelect').value;
    }

    function isNowggDomain(url) {
      return /nowgg\.fun|ip\.nowgg/i.test(url);
    }

    function isUrlLike(str) {
      str = str.trim();
      if (!str) return false;
      return /^(https?:\/\/)?([a-z0-9-]+\.)+[a-z0-9]+(\/.*)?$/i.test(str) ||
             (str.includes('.') && !str.includes(' ') && str.length > 8);
    }

    function getProxiedUrl(target) {
      if (currentProxy === "direct") return target;
      return PROXIES[currentProxy] + encodeURIComponent(target);
    }

    function performSearch() {
      let input = document.getElementById('searchInput').value.trim();
      if (!input) return;

      let target = isUrlLike(input) 
        ? (input.startsWith('http') ? input : 'https://' + input)
        : `https://www.bing.com/search?q=${encodeURIComponent(input)}`;

      document.getElementById('overlay').classList.add('hidden');
      document.getElementById('gamesOverlay').style.display = 'none';

      const iframe = document.getElementById('resultFrame');

      if (isNowggDomain(target)) {
        currentProxy = "allorigins";                    // Force best proxy for now.gg
        document.getElementById('proxySelect').value = "allorigins";
        iframe.src = getProxiedUrl(target);
        document.getElementById('reloadBtn').style.display = 'block';
      } else {
        iframe.src = getProxiedUrl(target);
        document.getElementById('reloadBtn').style.display = 'none';
      }
    }

    function reloadWithProxy() {
      const iframe = document.getElementById('resultFrame');
      let currentSrc = iframe.src;

      // Cycle to next proxy
      const keys = Object.keys(PROXIES);
      let idx = keys.indexOf(currentProxy);
      currentProxy = keys[(idx + 1) % keys.length];
      document.getElementById('proxySelect').value = currentProxy;

      if (currentSrc.includes('http')) {
        // Extract original URL and reload through new proxy
        let original = currentSrc;
        if (currentSrc.includes('?url=')) original = decodeURIComponent(currentSrc.split('?url=')[1] || currentSrc.split('?')[1]);
        iframe.src = getProxiedUrl(original);
      }
    }

    function newSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('overlay').classList.remove('hidden');
      document.getElementById('gamesOverlay').style.display = 'none';
      document.getElementById('resultFrame').src = 'about:blank';
      document.getElementById('reloadBtn').style.display = 'none';
      document.getElementById('searchInput').focus();
    }

    function showGames() {
      document.getElementById('gamesOverlay').style.display = 'flex';
      document.getElementById('overlay').classList.add('hidden');
      document.getElementById('resultFrame').src = 'about:blank';
    }

    function hideGames() {
      document.getElementById('gamesOverlay').style.display = 'none';
      document.getElementById('overlay').classList.remove('hidden');
    }

    // Enter key support
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') performSearch();
    });

    window.onload = () => {
      document.getElementById('searchInput').focus();
      const saved = localStorage.getItem('virginProxy') || 'allorigins';
      currentProxy = saved;
      document.getElementById('proxySelect').value = saved;
    };

    window.addEventListener('beforeunload', () => {
      localStorage.setItem('virginProxy', currentProxy);
    });
  </script>
</body>
</html>
