<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virgin v1</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #111;
      border-bottom: 2px solid #3a0000;
      padding: 15px 30px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #ff1a1a, #c8102e, #ff4d4d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .search-header {
      flex: 1;
      max-width: 720px;
      position: relative;
    }

    .search-header input {
      width: 100%;
      padding: 14px 20px;
      padding-right: 130px;
      font-size: 1.15rem;
      background: #1a1a1a;
      border: 2px solid #3a0000;
      border-radius: 50px;
      color: white;
      outline: none;
    }

    .search-header input:focus {
      border-color: #ff1a1a;
      box-shadow: 0 0 0 3px rgba(255, 26, 26, 0.25);
    }

    .search-btn {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      background: linear-gradient(90deg, #c8102e, #ff1a1a);
      color: white;
      border: none;
      padding: 11px 26px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
    }

    .proxy-selector {
      background: #1f1f1f;
      border: 2px solid #3a0000;
      color: #ff9999;
      padding: 8px 14px;
      border-radius: 30px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .iframe-container {
      flex: 1;
      background: #000;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(10, 10, 10, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 20;
    }

    .overlay.hidden { display: none; }

    .welcome {
      font-size: 2.8rem;
      color: #ff4d4d;
      margin-bottom: 12px;
    }

    .new-search-btn, .reload-proxy-btn {
      position: absolute;
      top: 18px;
      right: 30px;
      background: #3a0000;
      color: #ff9999;
      border: 1px solid #660000;
      padding: 9px 18px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.95rem;
      z-index: 30;
    }

    .reload-proxy-btn {
      right: 180px;
      background: #660000;
    }

    footer {
      background: #111;
      padding: 12px;
      text-align: center;
      color: #660000;
      font-size: 0.9rem;
      border-top: 1px solid #3a0000;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">VIRGIN v1</div>
    
    <div class="search-header">
      <input type="text" id="searchInput" placeholder="Paste link or search Bing..." autocomplete="off">
      <button class="search-btn" onclick="performSearch()">GO</button>
    </div>

    <select id="proxySelect" class="proxy-selector" onchange="saveProxyChoice()">
      <option value="direct">Direct (no proxy)</option>
      <option value="corsproxy" selected>corsproxy.io (fast)</option>
      <option value="allorigins">AllOrigins (best for now.gg)</option>
      <option value="thingproxy">ThingProxy (higher limits)</option>
    </select>
  </header>

  <div class="iframe-container">
    <button class="new-search-btn" onclick="newSearch()">NEW SEARCH</button>
    <button class="reload-proxy-btn" onclick="reloadWithProxy()" id="reloadBtn" style="display:none;">RELOAD WITH PROXY</button>

    <div class="overlay" id="overlay">
      <div class="welcome">Virgin v1</div>
      <p style="color:#ff9999; font-size:1.1rem;">Type a link or search term</p>
    </div>

    <iframe id="resultFrame" src="about:blank"></iframe>
  </div>

  <footer>
    Virgin v1 • Black &amp; Blood Red • Fixed now.gg IP switching + multiple proxies
  </footer>

  <script>
    // === MULTIPLE PROXIES (fixes 1MB limit & more sites) ===
    const PROXIES = {
      direct: "",
      corsproxy: "https://corsproxy.io/?",
      allorigins: "https://api.allorigins.win/raw?url=",
      thingproxy: "https://thingproxy.freeboard.io/fetch/"
    };

    let currentProxy = "allorigins"; // best default for now.gg

    function saveProxyChoice() {
      currentProxy = document.getElementById('proxySelect').value;
    }

    function isNowggDomain(url) {
      return url.includes('nowgg.fun') || url.includes('.ip.nowgg');
    }

    function isUrlLike(str) {
      str = str.trim();
      if (!str) return false;
      return /^(https?:\/\/)?([a-z0-9-]+\.)+[a-z0-9]+(\/.*)?$/i.test(str) ||
             (str.includes('.') && !str.includes(' ') && str.length > 8);
    }

    function getProxiedUrl(target) {
      if (currentProxy === "direct") return target;
      return PROXIES[currentProxy] + encodeURIComponent(target);
    }

    function performSearch() {
      let input = document.getElementById('searchInput').value.trim();
      if (!input) return;

      let target = "";

      if (isUrlLike(input)) {
        if (!input.startsWith('http')) target = 'https://' + input;
        else target = input;
      } else {
        target = `https://www.bing.com/search?q=${encodeURIComponent(input)}`;
      }

      // Hide overlay
      document.getElementById('overlay').classList.add('hidden');

      const iframe = document.getElementById('resultFrame');

      // If it's a now.gg link → ALWAYS use proxy (fixes IP switching)
      if (isNowggDomain(target)) {
        currentProxy = "allorigins"; // force best proxy for now.gg
        document.getElementById('proxySelect').value = "allorigins";
        iframe.src = getProxiedUrl(target);
        document.getElementById('reloadBtn').style.display = 'block';
      } 
      // Normal link or Bing search
      else {
        iframe.src = getProxiedUrl(target);
        document.getElementById('reloadBtn').style.display = 'none';
      }
    }

    function reloadWithProxy() {
      const iframe = document.getElementById('resultFrame');
      const currentSrc = iframe.src;

      // Try next proxy in rotation
      const keys = Object.keys(PROXIES);
      let idx = keys.indexOf(currentProxy);
      currentProxy = keys[(idx + 1) % keys.length];
      document.getElementById('proxySelect').value = currentProxy;

      // Reload the current page through the new proxy
      if (currentSrc.includes('http')) {
        const realUrl = currentSrc.split('?url=')[1] || currentSrc.split('?')[1] || currentSrc;
        iframe.src = getProxiedUrl(decodeURIComponent(realUrl));
      }
    }

    function newSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('overlay').classList.remove('hidden');
      document.getElementById('resultFrame').src = 'about:blank';
      document.getElementById('reloadBtn').style.display = 'none';
      document.getElementById('searchInput').focus();
    }

    // Enter key
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') performSearch();
    });

    window.onload = () => {
      document.getElementById('searchInput').focus();
      // Load user's last proxy choice
      const saved = localStorage.getItem('virginProxy') || 'allorigins';
      currentProxy = saved;
      document.getElementById('proxySelect').value = saved;
    };

    // Save proxy choice
    window.addEventListener('beforeunload', () => {
      localStorage.setItem('virginProxy', currentProxy);
    });
  </script>
</body>
</html>
